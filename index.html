<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Análise OTIF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        /* Estilos adicionais para uma melhor aparência */
        body {
            font-family: 'Inter', sans-serif;
        }
        .container {
            max-width: 1280px;
        }
        #modal-content {
             transition: transform 0.2s ease-out, opacity 0.2s ease-out;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-300">

    <!-- Overlay de Carregamento -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-slate-800 p-6 rounded-lg shadow-xl flex items-center">
            <svg class="animate-spin h-5 w-5 mr-3 text-blue-500" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="loading-message" class="text-slate-200 font-semibold">A processar...</span>
        </div>
    </div>

    <!-- Cabeçalho -->
    <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-10">
        <div class="container mx-auto flex items-center justify-between p-4">
            <h1 class="text-2xl font-bold text-slate-50">Análise OTIF</h1>
            <nav>
                <button id="nav-dashboard" class="py-2 px-4 font-semibold rounded-md transition-colors bg-blue-500 text-white">
                    Dashboard
                </button>
                <button id="nav-import" class="ml-4 py-2 px-4 font-semibold rounded-md transition-colors text-slate-300 hover:bg-slate-700">
                    Importar Ficheiro
                </button>
            </nav>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="container mx-auto p-4 sm:p-6 lg:p-8">
        <!-- Vista de Importação -->
        <div id="import-view" style="display: none;">
            <div class="flex flex-col items-center justify-center p-4 gap-8">
                <div id="drop-zone" class="w-full max-w-2xl p-8 text-center bg-slate-800 rounded-lg border-2 border-dashed border-slate-600 transition-colors">
                    <svg class="mx-auto h-12 w-12 text-slate-500" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    <h2 class="mt-4 text-2xl font-bold text-slate-50">Importar Novo Ficheiro</h2>
                    <p class="mt-2 text-sm text-slate-400">Arraste e solte um ficheiro .csv ou .xlsx aqui.</p>
                    <div class="mt-6">
                        <input type="file" id="file-upload" class="hidden" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
                        <label for="file-upload" class="cursor-pointer bg-blue-500 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-600 transition-colors">
                            Ou Selecione um Ficheiro
                        </label>
                    </div>
                     <p id="import-error" class="mt-4 text-sm text-red-600"></p>
                </div>
                <div id="history-section" class="w-full max-w-2xl p-8 bg-slate-800 rounded-lg border border-slate-700">
                    <h3 class="text-xl font-bold text-slate-50 mb-4">Ficheiros Carregados</h3>
                    <ul id="loaded-files-list" class="space-y-3">
                        <!-- A lista de ficheiros será inserida aqui -->
                    </ul>
                     <div class="mt-6 border-t border-slate-700 pt-6">
                         <button id="clear-history-btn" class="w-full font-bold py-2 px-4 rounded-md transition-colors bg-red-500 text-white hover:bg-red-600 disabled:bg-red-300 disabled:cursor-not-allowed">
                             Limpar Todo o Histórico
                         </button>
                     </div>
                </div>
            </div>
        </div>

        <!-- Vista do Dashboard -->
        <div id="dashboard-view">
            <!-- O conteúdo do dashboard será inserido aqui -->
        </div>
    </main>

    <!-- Modal de Confirmação -->
    <div id="confirmation-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-slate-800 p-6 sm:p-8 rounded-lg shadow-xl w-11/12 max-w-md transform transition-all scale-95 opacity-0 border border-slate-700" id="modal-content">
            <h2 id="modal-title" class="text-xl font-bold text-slate-50 mb-4">Confirmar Ação</h2>
            <p id="modal-message" class="text-slate-300 mb-6">Você tem certeza?</p>
            <div class="flex justify-end gap-4">
                <button id="modal-cancel-btn" class="py-2 px-4 font-semibold rounded-md transition-colors text-slate-300 bg-slate-700 hover:bg-slate-600">Cancelar</button>
                <button id="modal-confirm-btn" class="py-2 px-4 font-semibold rounded-md transition-colors bg-red-500 text-white hover:bg-red-600">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Botão Voltar ao Topo -->
    <button id="back-to-top" class="hidden fixed bottom-6 right-6 bg-blue-500 text-white p-3 rounded-full shadow-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-opacity">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
        </svg>
    </button>


    <script type="module">
        // --- CONFIGURAÇÃO ---
        // Database constants (not used in presentation mode)
        // const DB_NAME = 'otif-dashboard-db';
        // const DB_VERSION = 1;
        // const FILE_STORE = 'files';
        // const DATA_STORE = 'data';

        const OTIF_TARGET = 96;
        const ONTIME_TARGET = 96;
        const INFULL_TARGET = 99;

        // --- ESTADO DA APLICAÇÃO ---
        let allData = [];
        let loadedFiles = [];
        let currentView = 'dashboard';
        let appliedDateRange = { start: '', end: '' };
        let selectedCarrierFromFilter = null;
        let selectedRegion = null;
        let selectedState = null;
        let selectedCarrier = null;
        let selectedReason = null;
        let selectedDelayRange = null;
        let selectedDelayRegion = null;
        let selectedDelayUF = null;
        let isPendingDelayedDrilldownActive = false;
        let isMapDrilldownActive = false;
        let selectedKpiCard = null; // 'revenue' | 'ticket' | 'items' | 'freight' | 'delivery'
        let kpiDrilldownUF = null;
        let kpiViewMode = 'geo'; // 'geo' (por estado/cidade) | 'history' (evolução mensal)
        // let isDbAvailable = true;
        // let dbPromise;

        // --- MAPEAMENTO DE COLUNAS (para robustez) ---
        const KEY_MAPPINGS = {
            invoiceNumber: ['Numero NF', 'numero nf', 'NUMERO NF'],
            pedidoDate: ['Data Pedido', 'data pedido', 'DATA PEDIDO', 'Data do Pedido'],
            expeditionDate: ['Data expedição', 'data expedição', 'DATA EXPEDIÇÃO'],
            deliveryDate: ['Data de entrega', 'data de entrega', 'DATA DE ENTREGA'],
            status: ['Status Entrega', 'status entrega', 'STATUS ENTREGA'],
            divergent: ['Entrega divergente?', 'entrega divergente?', 'ENTREGA DIVERGENTE?', 'Divergência de Entrega'],
            carrier: ['TRANSPORTADORA', 'transportadora', 'Transportadora'],
            region: ['Região', 'região', 'REGIÃO'],
            uf: ['UF', 'uf'],
            city: ['Cidade', 'cidade', 'CIDADE', 'Cidade Destino', 'cidade destino', 'CIDADE DESTINO', 'Município', 'município', 'MUNICÍPIO', 'Municipio', 'municipio', 'MUNICIPIO'],
            delayReason: ['Motivos', 'motivos', 'MOTIVOS', 'Motivo Atraso'],
            discrepancyReason: ['Divergência', 'divergência', 'DIVERGÊNCIA', 'Motivo Divergência'],
            delayDays: ['DIAS ATRASOS ÚTEIS', 'dias atrasos úteis', 'Dias Atrasos Úteis', 'Dias de Atraso (Úteis)'],
            nfValue: ['Valor NF', 'valor nf', 'VALOR NF', 'Valor Total NF', 'VALOR TOTAL NF', 'VL NF', 'vl nf', 'Vlr NF', 'VLR NF', 'Valor Total', 'valor total', 'VALOR TOTAL', 'Valor', 'valor', 'VALOR'],
            freightValue: ['Valor Frete', 'valor frete', 'VALOR FRETE', 'Vl Frete', 'VL FRETE', 'Vlr Frete', 'VLR FRETE', 'Frete', 'frete', 'FRETE'],
            itemsQty: ['Qt Pedida', 'qt pedida', 'QT PEDIDA', 'Qtd Pedida', 'QTD PEDIDA', 'Qtde Pedida', 'Qtd Itens', 'qtd itens', 'QTD ITENS', 'Qtde Itens', 'QTDE ITENS', 'Quantidade Itens', 'quantidade itens', 'Qtd', 'QTDE', 'Quantidade', 'Items', 'Itens']
        };

        // Cache de chaves normalizadas por linha (evita recomputar para cada chamada)
        const _rowKeysCacheMap = new WeakMap();

        const getRowValue = (row, key) => {
            if (!row) return undefined;
            const keysToTry = KEY_MAPPINGS[key];
            if (!keysToTry) return undefined;
            // 1) Correspondência exata (caminho rápido)
            for (const k of keysToTry) {
                if (row[k] !== undefined) {
                    return row[k];
                }
            }
            // 2) Fallback case-insensitive + trim (cacheado por objeto de linha)
            let cachedKeys = _rowKeysCacheMap.get(row);
            if (!cachedKeys) {
                cachedKeys = {};
                for (const rowKey of Object.keys(row)) {
                    cachedKeys[rowKey.trim().toLowerCase()] = rowKey;
                }
                _rowKeysCacheMap.set(row, cachedKeys);
            }
            for (const k of keysToTry) {
                const norm = k.trim().toLowerCase();
                const actualKey = cachedKeys[norm];
                if (actualKey !== undefined && row[actualKey] !== undefined) {
                    return row[actualKey];
                }
            }
            return undefined;
        };

        const stateMappings = {
            'AC': { region: 'Norte', code: 'BR-AC' }, 'AL': { region: 'Nordeste', code: 'BR-AL' },
            'AP': { region: 'Norte', code: 'BR-AP' }, 'AM': { region: 'Norte', code: 'BR-AM' },
            'BA': { region: 'Nordeste', code: 'BR-BA' }, 'CE': { region: 'Nordeste', code: 'BR-CE' },
            'DF': { region: 'Centro-Oeste', code: 'BR-DF' }, 'ES': { region: 'Sudeste', code: 'BR-ES' },
            'GO': { region: 'Centro-Oeste', code: 'BR-GO' }, 'MA': { region: 'Nordeste', code: 'BR-MA' },
            'MT': { region: 'Centro-Oeste', code: 'BR-MT' }, 'MS': { region: 'Centro-Oeste', code: 'BR-MS' },
            'MG': { region: 'Sudeste', code: 'BR-MG' }, 'PA': { region: 'Norte', code: 'BR-PA' },
            'PB': { region: 'Nordeste', code: 'BR-PB' }, 'PR': { region: 'Sul', code: 'BR-PR' },
            'PE': { region: 'Nordeste', code: 'BR-PE' }, 'PI': { region: 'Nordeste', code: 'BR-PI' },
            'RJ': { region: 'Sudeste', code: 'BR-RJ' }, 'RN': { region: 'Nordeste', code: 'BR-RN' },
            'RS': { region: 'Sul', code: 'BR-RS' }, 'RO': { region: 'Norte', code: 'BR-RO' },
            'RR': { region: 'Norte', code: 'BR-RR' }, 'SC': { region: 'Sul', code: 'BR-SC' },
            'SP': { region: 'Sudeste', code: 'BR-SP' }, 'SE': { region: 'Nordeste', code: 'BR-SE' },
            'TO': { region: 'Norte', code: 'BR-TO' }
        };

        const regionInfo = {
            'Sul':        { colorIndex: 1, position: { top: '82%', left: '48%' } },
            'Sudeste':    { colorIndex: 2, position: { top: '70%', left: '60%' } },
            'Centro-Oeste': { colorIndex: 3, position: { top: '55%', left: '45%' } },
            'Nordeste':   { colorIndex: 4, position: { top: '40%', left: '70%' } },
            'Norte':      { colorIndex: 5, position: { top: '25%', left: '30%' } }
        };

        // --- ELEMENTOS DO DOM ---
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingMessage = document.getElementById('loading-message');
        const navDashboard = document.getElementById('nav-dashboard');
        const navImport = document.getElementById('nav-import');
        const importView = document.getElementById('import-view');
        const dashboardView = document.getElementById('dashboard-view');
        const dropZone = document.getElementById('drop-zone');
        const fileUpload = document.getElementById('file-upload');
        const importError = document.getElementById('import-error');
        const loadedFilesList = document.getElementById('loaded-files-list');
        const clearHistoryBtn = document.getElementById('clear-history-btn');
        const historySection = document.getElementById('history-section');
        const confirmationModal = document.getElementById('confirmation-modal');
        const modalContent = document.getElementById('modal-content');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');
        const modalConfirmBtn = document.getElementById('modal-confirm-btn');
        const backToTopBtn = document.getElementById('back-to-top');

        let confirmAction = null;

        // Carrega a biblioteca de gráficos do Google
        if (typeof google !== 'undefined' && google.charts) {
            google.charts.load('current', { 'packages':['geochart'] });
        } else {
            console.warn('Google Charts script não carregou (bloqueado neste ambiente de preview); o mapa do Brasil não será exibido.');
        }

        // --- BASE DE DADOS INDEXEDDB ---
        // Database initialization (not used in presentation mode)
        /*
        const initDb = () => {
             try {
                 dbPromise = new Promise((resolve, reject) => {
                     const request = indexedDB.open(DB_NAME, DB_VERSION);
                     request.onerror = (event) => {
                         console.error("Erro ao abrir IndexedDB:", event.target.error);
                         reject(event.target.error);
                     };
                     request.onsuccess = () => resolve(request.result);
                     request.onupgradeneeded = event => {
                         const db = event.target.result;
                         if (!db.objectStoreNames.contains(FILE_STORE)) {
                             db.createObjectStore(FILE_STORE, { keyPath: 'name' });
                         }
                         if (!db.objectStoreNames.contains(DATA_STORE)) {
                             const dataStore = db.createObjectStore(DATA_STORE, { autoIncrement: true });
                             dataStore.createIndex('fileName', 'fileName', { unique: false });
                         }
                     };
                 });
                 return dbPromise;
             } catch (e) {
                 console.error("IndexedDB não é suportado ou está bloqueado:", e);
                 return Promise.reject(e);
             }
        };
        */
        
        // --- FUNÇÕES DE CONTROLO ---
        const showLoading = (message = 'A processar...') => {
            loadingMessage.textContent = message;
            loadingOverlay.style.display = 'flex';
        };

        const hideLoading = () => {
            loadingOverlay.style.display = 'none';
        };

        const showModal = (title, message, onConfirm) => {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            confirmAction = onConfirm;
            confirmationModal.style.display = 'flex';
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        const hideModal = () => {
            modalContent.classList.add('scale-95', 'opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                confirmationModal.style.display = 'none';
                confirmAction = null;
            }, 200);
        };
        
        const switchView = (view) => {
            currentView = view;
            if (view === 'dashboard') {
                dashboardView.style.display = 'block';
                importView.style.display = 'none';
                navDashboard.classList.add('bg-blue-500', 'text-white');
                navDashboard.classList.remove('text-slate-300', 'hover:bg-slate-700');
                navImport.classList.remove('bg-blue-500', 'text-white');
                navImport.classList.add('text-slate-300', 'hover:bg-slate-700');
            } else {
                dashboardView.style.display = 'none';
                importView.style.display = 'block';
                navImport.classList.add('bg-blue-500', 'text-white');
                navImport.classList.remove('text-slate-300', 'hover:bg-slate-700');
                navDashboard.classList.remove('bg-blue-500', 'text-white');
                navDashboard.classList.add('text-slate-300', 'hover:bg-slate-700');
            }
        };

        const navigateToState = (newState) => {
            isPendingDelayedDrilldownActive = false;
            isMapDrilldownActive = false;
            selectedRegion = newState.region;
            selectedState = newState.state;
            selectedCarrier = newState.carrier;
            selectedReason = newState.reason;
            selectedDelayRange = newState.delayRange;
            selectedDelayRegion = newState.delayRegion;
            selectedDelayUF = newState.delayUF;
            selectedKpiCard = newState.kpiCard || null;
            kpiDrilldownUF = newState.kpiUF || null;
            kpiViewMode = 'geo';
            renderDashboard();
        }

        // --- FUNÇÕES DE RENDERIZAÇÃO ---
        const getOtifColorClass = (value) => {
            if (value >= 96) return 'bg-green-500';
            if (value > 90) return 'bg-yellow-500';
            return 'bg-red-500';
        };

        const getInFullColorClass = (value) => {
            if (value >= 99) return 'bg-green-500';
            if (value >= 90) return 'bg-yellow-500';
            return 'bg-red-500';
        };

        const getOtifTextColorClass = (value) => {
            if (value > 90 && value < 99) return 'text-black';
            return 'text-white';
        };

        const renderLoadedFiles = () => {
            clearHistoryBtn.disabled = loadedFiles.length === 0;
            if (loadedFiles.length === 0) {
                loadedFilesList.innerHTML = `<p class="text-slate-400">Nenhum ficheiro foi carregado ainda.</p>`;
                return;
            }
            loadedFilesList.innerHTML = loadedFiles
                .sort((a, b) => new Date(b.uploadDate) - new Date(a.uploadDate))
                .map(file => {
                    const rowCount = allData.filter(row => row.fileName === file.name).length;
                    const uploadDate = new Date(file.uploadDate);
                    const formattedDate = !isNaN(uploadDate) ? uploadDate.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'Data inválida';

                    return `
                    <li class="flex justify-between items-center bg-slate-700 p-3 rounded-md hover:bg-slate-600 transition-colors">
                        <div>
                             <p class="text-slate-100 font-semibold truncate pr-4">${file.name}</p>
                             <p class="text-xs text-slate-400">${rowCount.toLocaleString('pt-BR')} linhas - Carregado em ${formattedDate}</p>
                        </div>
                        <button data-filename="${file.name}" class="remove-file-btn text-red-500 hover:text-red-700 font-semibold flex-shrink-0">Remover</button>
                    </li>
                    `;
                }).join('');
        };
        
        const renderDashboard = () => {
             if (allData.length === 0) {
                 dashboardView.innerHTML = `
                     <div class="text-center bg-slate-800 p-8 rounded-lg border border-slate-700">
                         <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-16 w-16 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V7a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                         <h2 class="mt-4 text-2xl font-bold text-slate-50 mb-4">Bem-vindo ao Dashboard OTIF</h2>
                         <p class="text-slate-300 mb-6">Nenhum dado foi carregado. Por favor, vá à aba "Importar Ficheiro" para começar.</p>
                         <button id="go-to-import-btn" class="bg-blue-500 text-white font-bold py-2 px-6 rounded-md hover:bg-blue-600 transition-colors">
                             Importar Ficheiro
                         </button>
                     </div>
                 `;
                 return;
             }
            
            let viewHtml = '';

            if (isMapDrilldownActive) {
                viewHtml = renderRegionHistoryView(selectedRegion);
            } else if (isPendingDelayedDrilldownActive) {
                viewHtml = renderPendingDelayedDrilldownView();
            } else if (selectedState) {
                 viewHtml = renderStateDetailView(selectedRegion, selectedState);
            } else if (selectedRegion) {
                 viewHtml = renderRegionDetailView(selectedRegion);
            } else if (selectedCarrier) {
                 viewHtml = renderCarrierDetailView(selectedCarrier);
            } else if (selectedReason) {
                 viewHtml = renderReasonDetailView(selectedReason);
            } else if (selectedDelayUF) {
                 viewHtml = renderDelayByCarrierInUFView(selectedDelayRange, selectedDelayRegion, selectedDelayUF);
            } else if (selectedDelayRegion) {
                 viewHtml = renderDelayByUFView(selectedDelayRange, selectedDelayRegion);
            } else if (selectedDelayRange) {
                 viewHtml = renderDelayByRegionView(selectedDelayRange);
            } else if (selectedKpiCard) {
                 viewHtml = renderKpiDrilldownView(selectedKpiCard, kpiDrilldownUF);
            } else {
                 viewHtml = renderMainDashboardView();
            }

            dashboardView.innerHTML = `
                <div class="space-y-6">
                    ${renderBreadcrumbs()}
                    <div id="dashboard-messages"></div> <!-- Container for messages -->
                    ${renderDateFilter()}
                    ${viewHtml}
                </div>
            `;

            // Draw charts after HTML is rendered
            if (!isMapDrilldownActive && !isPendingDelayedDrilldownActive && !selectedState && !selectedRegion && !selectedCarrier && !selectedReason && !selectedDelayRange && !selectedKpiCard) {
                // Use a timeout to ensure the DOM is ready for the chart
                setTimeout(() => {
                    const metrics = calculateMetrics();
                    if (metrics && metrics.mapData.length > 1) { // Check if there is data to draw
                        drawMapChart(metrics.mapData);
                    }
                }, 0);
            }
        };

        // Configuração central dos 5 cards de KPI, usada tanto na faixa de topo quanto no drilldown
        const KPI_CARD_CONFIG = {
            revenue: {
                title: 'Faturamento Total',
                barColor: 'bg-green-500',
                getValue: (m) => m.totalRevenue,
                formatValue: (v) => `R$ ${v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`,
                volumeLabel: (m) => `${m.totalDeliveries.toLocaleString('pt-BR')} NFs`
            },
            ticket: {
                title: 'Ticket Médio P/ Pedido',
                barColor: 'bg-blue-500',
                getValue: (m) => m.avgTicket,
                formatValue: (v) => `R$ ${v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`,
                volumeLabel: (m) => `${m.totalDeliveries.toLocaleString('pt-BR')} NFs`
            },
            items: {
                title: 'Itens Vendidos',
                barColor: 'bg-blue-500',
                getValue: (m) => m.totalItems,
                formatValue: (v) => v.toLocaleString('pt-BR'),
                volumeLabel: (m) => `${m.avgItemsPerNF.toFixed(1)} por pedido`
            },
            freight: {
                title: 'Frete Médio P/ Volume',
                barColor: 'bg-orange-500',
                getValue: (m) => m.avgFreight,
                formatValue: (v) => `R$ ${v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`,
                volumeLabel: (m) => `${m.totalItems.toLocaleString('pt-BR')} itens`
            },
            delivery: {
                title: 'Tempo de Entrega',
                barColor: 'bg-purple-500',
                getValue: (m) => m.avgDeliveryDays,
                formatValue: (v) => `${v.toFixed(1)} dias`,
                volumeLabel: (m) => `${m.deliveryCount.toLocaleString('pt-BR')} pedidos`
            }
        };

        // --- Helpers leves para o drilldown de KPI (evitam chamar calculateMetrics, que é pesada) ---
        const kpiParseNumericValue = (v) => {
            if (v === undefined || v === null || v === '') return 0;
            if (typeof v === 'number') return v;
            const str = String(v).trim();
            if (!str) return 0;
            const lastDot = str.lastIndexOf('.');
            const lastComma = str.lastIndexOf(',');
            if (lastComma > lastDot) {
                return parseFloat(str.replace(/\./g, '').replace(',', '.')) || 0;
            }
            return parseFloat(str.replace(/,/g, '')) || 0;
        };

        const kpiCountBusinessDays = (start, end) => {
            if (!start || !end || isNaN(start.getTime()) || isNaN(end.getTime())) return null;
            let count = 0;
            const cur = new Date(start);
            cur.setHours(0, 0, 0, 0);
            const endDay = new Date(end);
            endDay.setHours(0, 0, 0, 0);
            cur.setDate(cur.getDate() + 1);
            while (cur <= endDay) {
                const day = cur.getDay();
                if (day !== 0 && day !== 6) count++;
                cur.setDate(cur.getDate() + 1);
            }
            return count;
        };

        // Calcula, numa única passagem, só os números usados pelos 5 cards de KPI (mesma fórmula de calculateMetrics,
        // mas sem recalcular OTIF/motivos/mapa/histórico geral — por isso é muito mais rápida para uso em drilldowns).
        const computeKpiAggregates = (data) => {
            const seen = new Set();
            let totalFreight = 0, totalNFValue = 0, uniqueNFCount = 0, totalItems = 0;
            let deliverySum = 0, deliveryCount = 0;

            for (const row of data) {
                totalNFValue += kpiParseNumericValue(getRowValue(row, 'nfValue'));
                const itemsVal = getRowValue(row, 'itemsQty');
                totalItems += itemsVal !== undefined ? (parseInt(itemsVal, 10) || 0) : 0;

                const nf = getRowValue(row, 'invoiceNumber');
                const key = nf ? String(nf).trim() : null;
                const isFirstOccurrence = !key || !seen.has(key);
                if (key) seen.add(key);

                if (isFirstOccurrence) {
                    uniqueNFCount++;
                    totalFreight += kpiParseNumericValue(getRowValue(row, 'freightValue'));

                    if (getRowValue(row, 'delayReason') !== 'Desistência de compra') {
                        const dDate = getRowValue(row, 'deliveryDate');
                        if (dDate && String(dDate).trim() !== '') {
                            const days = kpiCountBusinessDays(parseDate(getRowValue(row, 'pedidoDate')), parseDate(dDate));
                            if (days !== null && days > 0) {
                                deliverySum += days;
                                deliveryCount++;
                            }
                        }
                    }
                }
            }

            const totalRevenue = totalNFValue + totalFreight;
            return {
                totalRevenue,
                avgTicket: uniqueNFCount > 0 ? totalRevenue / uniqueNFCount : 0,
                totalItems,
                avgItemsPerNF: uniqueNFCount > 0 ? totalItems / uniqueNFCount : 0,
                avgFreight: totalItems > 0 ? totalFreight / totalItems : 0,
                avgDeliveryDays: deliveryCount > 0 ? deliverySum / deliveryCount : 0,
                deliveryCount,
                totalDeliveries: uniqueNFCount
            };
        };

        // Agrupa linhas por uma chave (UF, cidade, mês...) numa única passagem O(n), em vez de N filtros O(n) cada
        const groupRowsByKey = (data, keyFn) => {
            const groups = new Map();
            for (const row of data) {
                const label = keyFn(row);
                if (!label) continue;
                if (!groups.has(label)) groups.set(label, []);
                groups.get(label).push(row);
            }
            return groups;
        };

        // Histórico mensal (últimos N meses com dados) de uma métrica de KPI para um subconjunto de dados
        const computeKpiMonthlyHistory = (data, monthsToShow = 12) => {
            const buckets = groupRowsByKey(data, (row) => {
                const d = parseDate(getRowValue(row, 'pedidoDate'));
                if (!d || isNaN(d.getTime())) return null;
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            });
            const sortedKeys = [...buckets.keys()].sort();
            const lastKeys = sortedKeys.slice(-monthsToShow);
            return lastKeys.map(key => {
                const [y, mo] = key.split('-');
                const monthLabel = new Date(parseInt(y, 10), parseInt(mo, 10) - 1, 1).toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
                return { key, label: monthLabel, metrics: computeKpiAggregates(buckets.get(key)) };
            });
        };

        const renderKpiHistoryPanel = (config, data) => {
            const monthly = computeKpiMonthlyHistory(data, 12);
            if (monthly.length === 0) {
                return `<p class="text-slate-400">Sem dados suficientes para exibir o histórico mensal.</p>`;
            }
            const values = monthly.map(m => config.getValue(m.metrics));
            const maxValue = Math.max(...values, 0.0001);
            return `
            <div class="space-y-3">
                ${monthly.map((m, idx) => `
                    <div class="flex items-center group">
                        <p class="w-1/5 text-sm text-slate-300 pr-2 capitalize">${m.label}</p>
                        <div class="w-4/5 bg-slate-700 rounded-full h-6">
                            <div class="${config.barColor} h-6 rounded-full text-white text-xs flex items-center justify-end pr-2" style="width: ${Math.max((values[idx] / maxValue) * 100, 4)}%;">
                                ${config.formatValue(values[idx])}
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>`;
        };

        const renderKpiHistoryToggleBtn = () => `
            <button id="kpi-toggle-history" class="text-sm font-medium mb-4 inline-flex items-center gap-1 ${kpiViewMode === 'history' ? 'text-blue-400 hover:text-blue-300' : 'text-slate-400 hover:text-slate-200'}">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm6 0V9a2 2 0 012-2h0a2 2 0 012 2v10m-6 0V5a2 2 0 012-2h0a2 2 0 012 2v14"/></svg>
                ${kpiViewMode === 'history' ? 'Ver Detalhamento por Estado/Cidade' : 'Ver Histórico Mensal'}
            </button>`;

        // View de drilldown dos cards de KPI: nível 1 = por Estado, nível 2 = por Cidade, com opção de histórico mensal.
        // Usa computeKpiAggregates + groupRowsByKey (agregação O(n) numa única passagem) em vez de calculateMetrics,
        // que reprocessaria o dataset inteiro (incluindo o histórico geral) a cada estado/cidade.
        const renderKpiDrilldownView = (cardKey, uf) => {
            const config = KPI_CARD_CONFIG[cardKey];
            if (!config) return renderMainDashboardView();

            const baseData = getFilteredData();
            const scopedData = uf ? baseData.filter(row => getRowValue(row, 'uf') === uf) : baseData;

            const missingColumnHtml = (label) => `
                <p class="text-sm text-yellow-400 flex items-center gap-1">
                    <svg class="h-3 w-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    ${label}
                </p>`;

            // --- Nível 2: cidades dentro do estado selecionado ---
            if (uf) {
                const backBtn = `<button id="kpi-back-to-states" class="text-sm text-blue-400 hover:text-blue-300 font-medium mb-4 inline-flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Voltar para Estados
                </button>`;

                if (kpiViewMode === 'history') {
                    return `
                    <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                        <div class="flex flex-wrap items-center justify-between gap-2">${backBtn}${renderKpiHistoryToggleBtn()}</div>
                        <h3 class="text-lg font-semibold mb-1 text-slate-200">${config.title} — Histórico Mensal</h3>
                        <p class="text-sm text-slate-400 mb-4">Estado: <span class="text-slate-200 font-medium">${uf}</span></p>
                        ${renderKpiHistoryPanel(config, scopedData)}
                    </div>`;
                }

                const cityGroups = groupRowsByKey(scopedData, (row) => getRowValue(row, 'city'));
                if (cityGroups.size === 0) {
                    return `
                    <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                        <div class="flex flex-wrap items-center justify-between gap-2">${backBtn}${renderKpiHistoryToggleBtn()}</div>
                        <h3 class="text-lg font-semibold mb-2 text-slate-200">${config.title} — ${uf}</h3>
                        ${missingColumnHtml('Coluna de cidade não encontrada nos dados importados.')}
                    </div>`;
                }

                const cityRows = [...cityGroups.entries()].map(([label, rows]) => {
                    const m = computeKpiAggregates(rows);
                    return { label, value: config.getValue(m), volumeLabel: config.volumeLabel(m) };
                }).sort((a, b) => b.value - a.value);
                const maxValue = Math.max(...cityRows.map(r => r.value), 0.0001);

                return `
                <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <div class="flex flex-wrap items-center justify-between gap-2">${backBtn}${renderKpiHistoryToggleBtn()}</div>
                    <h3 class="text-lg font-semibold mb-1 text-slate-200">${config.title} por Cidade</h3>
                    <p class="text-sm text-slate-400 mb-4">Estado: <span class="text-slate-200 font-medium">${uf}</span></p>
                    <div class="space-y-4">
                        ${cityRows.map(item => `
                            <div class="flex items-center group">
                                <p class="w-2/5 text-sm text-slate-300 truncate pr-2">${item.label} <span class="text-xs text-slate-500">(${item.volumeLabel})</span></p>
                                <div class="w-3/5 bg-slate-700 rounded-full h-6">
                                    <div class="${config.barColor} h-6 rounded-full text-white text-xs flex items-center justify-end pr-2" style="width: ${Math.max((item.value / maxValue) * 100, 4)}%;">
                                        ${config.formatValue(item.value)}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }

            // --- Nível 1: estados (UF) ---
            const closeBtn = `<button id="kpi-close-drilldown" class="text-sm text-slate-400 hover:text-slate-200 font-medium mb-4 inline-flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                Fechar detalhamento
            </button>`;

            if (kpiViewMode === 'history') {
                return `
                <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <div class="flex flex-wrap items-center justify-between gap-2">${closeBtn}${renderKpiHistoryToggleBtn()}</div>
                    <h3 class="text-lg font-semibold mb-1 text-slate-200">${config.title} — Histórico Mensal</h3>
                    <p class="text-sm text-slate-400 mb-4">Evolução nos últimos meses com dados (respeitando os filtros aplicados).</p>
                    ${renderKpiHistoryPanel(config, scopedData)}
                </div>`;
            }

            const ufGroups = groupRowsByKey(baseData, (row) => getRowValue(row, 'uf'));
            if (ufGroups.size === 0) {
                return `<div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <div class="flex flex-wrap items-center justify-between gap-2">${closeBtn}${renderKpiHistoryToggleBtn()}</div>
                    <h3 class="text-lg font-semibold mb-2 text-slate-200">${config.title} por Estado</h3>
                    ${missingColumnHtml('Coluna de UF não encontrada nos dados importados.')}
                </div>`;
            }

            const ufRows = [...ufGroups.entries()].map(([label, rows]) => {
                const m = computeKpiAggregates(rows);
                return { label, value: config.getValue(m), volumeLabel: config.volumeLabel(m) };
            }).sort((a, b) => b.value - a.value);
            const maxValue = Math.max(...ufRows.map(r => r.value), 0.0001);

            return `
            <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                <div class="flex flex-wrap items-center justify-between gap-2">${closeBtn}${renderKpiHistoryToggleBtn()}</div>
                <h3 class="text-lg font-semibold mb-1 text-slate-200">${config.title} por Estado</h3>
                <p class="text-sm text-slate-400 mb-4">Clique num estado para detalhar por cidade.</p>
                <div class="space-y-4">
                    ${ufRows.map(item => `
                        <div data-uf="${item.label}" class="kpi-uf-row flex items-center group cursor-pointer">
                            <p class="w-2/5 text-sm text-slate-300 truncate pr-2 group-hover:text-blue-400">${item.label} <span class="text-xs text-slate-500">(${item.volumeLabel})</span></p>
                            <div class="w-3/5 bg-slate-700 rounded-full h-6">
                                <div class="${config.barColor} h-6 rounded-full text-white text-xs flex items-center justify-end pr-2 group-hover:opacity-80 transition-opacity" style="width: ${Math.max((item.value / maxValue) * 100, 4)}%;">
                                    ${config.formatValue(item.value)}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        };

        const renderKPIStrip = (metrics) => {
            const fmtCurrency = (n) => n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const st = metrics.kpiColumnStatus || {};
            const headers = metrics.allColumnHeaders || [];

            const missingHtml = (columnKey, label, aliases) => {
                if (st[columnKey]) return '';
                return `<p class="mt-1 text-xs text-yellow-400 flex items-center gap-1">
                    <svg class="h-3 w-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Coluna não encontrada
                </p>`;
            };

            const colListHtml = headers.length > 0
                ? `<details class="mt-3 col-span-full">
                    <summary class="cursor-pointer text-xs text-slate-400 hover:text-slate-200">
                        ▶ Ver colunas disponíveis no ficheiro (${headers.length})
                    </summary>
                    <div class="mt-2 p-3 bg-slate-900 rounded-md border border-slate-600 text-xs text-slate-300 break-all leading-5">
                        ${headers.map(h => `<span class="inline-block bg-slate-700 rounded px-1.5 py-0.5 mr-1 mb-1 font-mono">${h}</span>`).join('')}
                    </div>
                   </details>`
                : '';

            const anyMissing = !st.nfValue || !st.freightValue || !st.itemsQty;

            return `
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
                <div data-kpi-card="revenue" class="kpi-card bg-slate-800 rounded-lg border ${!st.nfValue ? 'border-yellow-700' : 'border-slate-700'} p-4 hover:border-blue-500 transition-colors cursor-pointer">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Faturamento Total</p>
                        <div class="p-2 rounded-full bg-green-500/20 text-green-400 flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        </div>
                    </div>
                    <p class="mt-2 text-xl font-bold text-slate-50 truncate">R$ ${fmtCurrency(metrics.totalRevenue)}</p>
                    <p class="mt-1 text-xs text-green-400">NF Valor Total da operação</p>
                    ${missingHtml('nfValue', 'Valor NF', [])}
                </div>
                <div data-kpi-card="ticket" class="kpi-card bg-slate-800 rounded-lg border ${!st.nfValue ? 'border-yellow-700' : 'border-slate-700'} p-4 hover:border-blue-500 transition-colors cursor-pointer">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Ticket Médio P/ Pedido</p>
                        <div class="p-2 rounded-full bg-blue-500/20 text-blue-400 flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                        </div>
                    </div>
                    <p class="mt-2 text-xl font-bold text-slate-50 truncate">R$ ${fmtCurrency(metrics.avgTicket)}</p>
                    <p class="mt-1 text-xs text-slate-400">Média de valor por nota fiscal</p>
                    ${missingHtml('nfValue', 'Valor NF', [])}
                </div>
                <div data-kpi-card="items" class="kpi-card bg-slate-800 rounded-lg border ${!st.itemsQty ? 'border-yellow-700' : 'border-slate-700'} p-4 hover:border-blue-500 transition-colors cursor-pointer">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Itens Vendidos</p>
                        <div class="p-2 rounded-full bg-blue-500/20 text-blue-400 flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" /></svg>
                        </div>
                    </div>
                    <p class="mt-2 text-xl font-bold text-slate-50">${metrics.totalItems.toLocaleString('pt-BR')}</p>
                    <p class="mt-1 text-xs text-slate-400">${metrics.avgItemsPerNF.toFixed(1)} por pedido</p>
                    ${missingHtml('itemsQty', 'Qtd Itens', [])}
                </div>
                <div data-kpi-card="freight" class="kpi-card bg-slate-800 rounded-lg border ${!st.freightValue ? 'border-yellow-700' : 'border-slate-700'} p-4 hover:border-blue-500 transition-colors cursor-pointer">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Frete Médio P/ Volume</p>
                        <div class="p-2 rounded-full bg-orange-500/20 text-orange-400 flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l2 2h9m1-12h3l3 5v5h-6V4z" /></svg>
                        </div>
                    </div>
                    <p class="mt-2 text-xl font-bold text-slate-50 truncate">R$ ${fmtCurrency(metrics.avgFreight)}</p>
                    <p class="mt-1 text-xs"><span class="text-orange-400">Representa ${metrics.freightAsPercentOfRevenue.toFixed(1)}%</span><span class="text-slate-400"> do faturamento</span></p>
                    ${missingHtml('freightValue', 'Valor Frete', [])}
                </div>
                <div data-kpi-card="delivery" class="kpi-card bg-slate-800 rounded-lg border border-slate-700 p-4 hover:border-blue-500 transition-colors cursor-pointer">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Tempo de Entrega</p>
                        <div class="p-2 rounded-full bg-purple-500/20 text-purple-400 flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        </div>
                    </div>
                    <p class="mt-2 text-xl font-bold text-slate-50">${metrics.avgDeliveryDays.toFixed(1)} dias</p>
                    <p class="mt-1 text-xs text-slate-400">Média dias úteis · <span class="text-slate-300">${metrics.deliveryCount} pedidos</span></p>
                </div>
                ${anyMissing ? colListHtml : ''}
            </div>`;
        };

        const renderMainDashboardView = () => {
            const metrics = calculateMetrics();

            if (!metrics || metrics.totalDeliveries === 0) {
                 return `<div class="bg-slate-800 p-6 rounded-lg border border-slate-700 text-center">
                             <h3 class="text-lg font-semibold mb-4 text-slate-200">Nenhum dado encontrado</h3>
                             <p class="text-slate-400">Não há registos que correspondam aos filtros aplicados.</p>
                         </div>`;
             }

            return `
                ${renderDashboardHeader(metrics)}
                ${renderKPIStrip(metrics)}
                ${renderDeliveryStatusCards(metrics)}
                ${renderMapChart(metrics)}
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
                    ${renderSingleMetricChart(metrics.monthlyPerformance, 'Performance Mensal - OTIF', 'otifRate', 'otifCount', metrics.yearForHistory, OTIF_TARGET)}
                    ${renderSingleMetricChart(metrics.monthlyPerformance, 'Performance Mensal - On Time', 'onTimeRate', 'onTimeCount', metrics.yearForHistory, ONTIME_TARGET)}
                    ${renderSingleMetricChart(metrics.monthlyPerformance, 'Performance Mensal - In Full', 'inFullRate', 'inFullCount', metrics.yearForHistory, INFULL_TARGET)}
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    ${renderStatCard('OTIF Geral', `${metrics.otifRate.toFixed(1)}%`, 'bg-blue-500/20 text-blue-400', '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>')}
                    ${renderStatCard('On-Time (No Prazo)', `${metrics.onTimeRate.toFixed(1)}%`, 'bg-green-500/20 text-green-400', '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>')}
                    ${renderStatCard('In-Full (Sem Divergência)', `${metrics.inFullRate.toFixed(1)}%`, 'bg-indigo-500/20 text-indigo-400', '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" /></svg>')}
                    ${renderStatCard('Total de Linhas', metrics.totalDeliveries.toLocaleString('pt-BR'), 'bg-slate-500/20 text-slate-400', '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2H5a2 2 0 00-2 2v2m14 0h-2" /></svg>')}
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    ${renderBarChart('carrier-performance', metrics.carrierPerformance, 'Performance OTIF por Transportadora', true)}
                    ${renderBarChart('region-performance', metrics.regionPerformance, 'Performance OTIF por Região', true)}
                </div>
                 <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    ${renderReasonTable('delay-reasons', metrics.topDelayReasons, 'Principais Motivos de Atraso', metrics.totalForDelayReasons, 'delay')}
                    ${renderReasonTable('discrepancy-reasons', metrics.topDiscrepancyReasons, 'Principais Motivos de Divergência', metrics.totalDiscrepancy, 'discrepancy')}
                </div>
                 <div class="grid grid-cols-1 gap-6">
                    ${renderCountBarChart('delay-distribution', metrics.delayDistributionData, 'Distribuição de Atrasos (Dias Úteis)', true)}
                </div>
            `;
        }

        const renderDashboardHeader = (metrics) => `
            <div class="flex flex-wrap justify-between items-start gap-4 p-6 bg-slate-800 rounded-lg border border-slate-700">
                <div>
                    <h2 class="text-2xl font-bold text-slate-50">Resumo da Performance</h2>
                    <p class="text-slate-300">Analisando ${metrics.totalDeliveries.toLocaleString('pt-BR')} linhas de ${loadedFiles.length} ficheiro(s).</p>
                </div>
            </div>`;
            
        const renderDateFilter = () => {
             const carriers = [...new Set(allData.map(row => getRowValue(row, 'carrier')).filter(Boolean))].sort();
            return `
             <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 flex flex-wrap items-center gap-4">
                 <span class="font-semibold text-slate-200">Filtrar por:</span>
                 <div>
                     <label for="start-date" class="text-sm text-slate-300 mr-2">Data do Pedido (De):</label>
                     <input type="date" name="start" id="start-date" value="${appliedDateRange.start}" class="bg-slate-700 border-slate-600 rounded-md shadow-sm p-2 text-slate-300">
                 </div>
                 <div>
                    <label for="end-date" class="text-sm text-slate-300 mr-2">Até:</label>
                    <input type="date" name="end" id="end-date" value="${appliedDateRange.end}" class="bg-slate-700 border-slate-600 rounded-md shadow-sm p-2 text-slate-300">
                 </div>
                 <div>
                    <label for="carrier-filter" class="text-sm text-slate-300 mr-2">Transportadora:</label>
                    <select id="carrier-filter" class="bg-slate-700 border-slate-600 rounded-md shadow-sm p-2 text-slate-300">
                        <option value="">Todas</option>
                        ${carriers.map(c => `<option value="${c}" ${selectedCarrierFromFilter === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                 </div>
                 <button id="apply-filter-btn" class="bg-blue-500 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-600 transition-colors">Aplicar</button>
                 <button id="clear-filter-btn" class="bg-slate-600 text-slate-200 font-bold py-2 px-4 rounded-md hover:bg-slate-500 transition-colors">Limpar Filtro</button>
             </div>`;
        }
        
        const renderBreadcrumbs = () => {
            const initialState = { region: null, state: null, carrier: null, reason: null, delayRange: null, delayRegion: null, delayUF: null, kpiCard: null, kpiUF: null };
            let crumbs = [{ label: 'Dashboard', state: initialState }];
            
            let terminalCrumbLabel = '';

            if (isMapDrilldownActive) {
                terminalCrumbLabel = `Histórico da Região: ${selectedRegion}`;
            } else if (isPendingDelayedDrilldownActive) {
                terminalCrumbLabel = 'Pendentes em Atraso';
            } else if (selectedDelayUF) {
                crumbs.push({ label: `Atraso: ${selectedDelayRange}`, state: { ...initialState, delayRange: selectedDelayRange } });
                crumbs.push({ label: selectedDelayRegion, state: { ...initialState, delayRange: selectedDelayRange, delayRegion: selectedDelayRegion } });
                terminalCrumbLabel = selectedDelayUF;
            } else if (selectedDelayRegion) {
                 crumbs.push({ label: `Atraso: ${selectedDelayRange}`, state: { ...initialState, delayRange: selectedDelayRange } });
                 terminalCrumbLabel = selectedDelayRegion;
            } else if (selectedDelayRange) {
                 terminalCrumbLabel = `Atraso: ${selectedDelayRange}`;
            } else if (selectedReason) {
                terminalCrumbLabel = `Motivo: ${selectedReason.reason}`;
            } else if (selectedCarrier) {
                terminalCrumbLabel = `Transportadora: ${selectedCarrier}`;
            } else if (selectedState) {
                crumbs.push({ label: selectedRegion, state: { ...initialState, region: selectedRegion } });
                terminalCrumbLabel = selectedState;
            } else if (selectedRegion) {
                terminalCrumbLabel = selectedRegion;
            } else if (kpiDrilldownUF) {
                crumbs.push({ label: KPI_CARD_CONFIG[selectedKpiCard].title, state: { ...initialState, kpiCard: selectedKpiCard } });
                terminalCrumbLabel = kpiDrilldownUF;
            } else if (selectedKpiCard) {
                terminalCrumbLabel = KPI_CARD_CONFIG[selectedKpiCard].title;
            }

            if(terminalCrumbLabel) crumbs.push({label: terminalCrumbLabel, state: {}});


            return `<nav class="flex" aria-label="Breadcrumb">
              <ol class="inline-flex items-center space-x-1 md:space-x-3">
                ${crumbs.map((crumb, index) => {
                    const isLast = index === crumbs.length - 1;
                    if (isLast) {
                        return `<li aria-current="page"><div class="flex items-center"><span class="ml-1 text-sm font-bold text-slate-200 md:ml-2">${crumb.label}</span></div></li>`;
                    } else {
                        return `<li class="inline-flex items-center">
                          <a href="#" class="breadcrumb-link inline-flex items-center text-sm font-medium text-blue-400 hover:text-blue-500" data-state='${JSON.stringify(crumb.state)}'>
                            ${index > 0 ? '<svg class="w-3 h-3 text-slate-500 mx-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/></svg>' : ''}
                            ${crumb.label}
                          </a>
                        </li>`;
                    }
                }).join('')}
              </ol>
            </nav>`;
        };

        const renderStatCard = (title, value, color, icon) => `
            <div class="bg-slate-800 p-6 rounded-lg border border-slate-700 flex items-center hover:border-slate-600 transition-colors cursor-default">
                <div class="mr-4 p-3 rounded-full ${color}">${icon}</div>
                <div>
                    <p class="text-sm text-slate-400">${title}</p>
                    <p class="text-2xl font-bold text-slate-50">${value}</p>
                </div>
            </div>`;

        const renderDeliveryStatusCards = (metrics) => {
            const deliveredOnTimePercent = metrics.deliveredTotal > 0 ? (metrics.deliveredOnTime / metrics.deliveredTotal * 100).toFixed(1) : '0.0';
            const deliveredDelayedPercent = metrics.deliveredTotal > 0 ? (metrics.deliveredDelayed / metrics.deliveredTotal * 100).toFixed(1) : '0.0';
            const pendingOnTimePercent = metrics.pendingTotal > 0 ? (metrics.pendingOnTime / metrics.pendingTotal * 100).toFixed(1) : '0.0';
            const pendingDelayedPercent = metrics.pendingTotal > 0 ? (metrics.pendingDelayed / metrics.pendingTotal * 100).toFixed(1) : '0.0';

            return `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <h3 class="text-lg font-semibold mb-4 text-slate-200">Pedidos Entregues</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                            <span class="font-medium text-slate-300">Total</span>
                            <span class="font-bold text-xl text-blue-400">${metrics.deliveredTotal.toLocaleString('pt-BR')}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-300">No Prazo</span>
                            <div>
                                <span class="font-semibold text-green-400">${metrics.deliveredOnTime.toLocaleString('pt-BR')}</span>
                                <span class="text-xs text-slate-400 ml-2">(${deliveredOnTimePercent}%)</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-300">Em Atraso</span>
                            <div>
                                <span class="font-semibold text-red-400">${metrics.deliveredDelayed.toLocaleString('pt-BR')}</span>
                                <span class="text-xs text-slate-400 ml-2">(${deliveredDelayedPercent}%)</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <h3 class="text-lg font-semibold mb-4 text-slate-200">Pedidos Pendentes</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                            <span class="font-medium text-slate-300">Total</span>
                            <span class="font-bold text-xl text-yellow-400">${metrics.pendingTotal.toLocaleString('pt-BR')}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-300">No Prazo</span>
                            <div>
                                <span class="font-semibold text-green-400">${metrics.pendingOnTime.toLocaleString('pt-BR')}</span>
                                <span class="text-xs text-slate-400 ml-2">(${pendingOnTimePercent}%)</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-300">Em Atraso</span>
                            <a href="#" id="drilldown-pending-delayed" class="font-semibold text-red-400 cursor-pointer hover:underline">
                                ${metrics.pendingDelayed.toLocaleString('pt-BR')}
                                <span class="text-xs text-slate-400 ml-1">(${pendingDelayedPercent}%)</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        const renderPendingDelayedDrilldownView = () => {
            const metrics = calculateMetrics();
            const drilldownData = metrics.pendingDelayedByCarrierAndRange;
            const delayRanges = ["1 dia", "2 a 3 dias", "4 a 5 dias", "6 dias ou mais"];

            if (!drilldownData || Object.keys(drilldownData).length === 0) {
                return `<div class="bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 class="text-lg font-semibold mb-4 text-slate-200">Detalhe de Pedidos Pendentes em Atraso</h3><p class="text-slate-400">Nenhum pedido pendente em atraso encontrado para o período selecionado.</p></div>`;
            }

            const tableData = Object.entries(drilldownData).map(([carrier, ranges]) => {
                const total = Object.values(ranges).reduce((sum, count) => sum + count, 0);
                return { carrier, ranges, total };
            }).sort((a, b) => b.total - a.total);

            const totals = { "1 dia": 0, "2 a 3 dias": 0, "4 a 5 dias": 0, "6 dias ou mais": 0, grandTotal: 0 };
            tableData.forEach(item => {
                delayRanges.forEach(range => {
                    totals[range] += item.ranges[range] || 0;
                });
                totals.grandTotal += item.total;
            });

            return `
                <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <h3 class="text-lg font-semibold mb-4 text-slate-200">Detalhe de Pedidos Pendentes em Atraso por Transportadora</h3>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-700">
                            <thead class="bg-slate-900/50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Transportadora</th>
                                    ${delayRanges.map(range => `<th scope="col" class="px-6 py-3 text-right text-xs font-medium text-slate-400 uppercase tracking-wider">${range}</th>`).join('')}
                                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-slate-400 uppercase tracking-wider">Total</th>
                                </tr>
                            </thead>
                            <tbody class="bg-slate-800 divide-y divide-slate-700">
                                ${tableData.map(item => `
                                    <tr>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-100">${item.carrier}</td>
                                        ${delayRanges.map(range => `<td class="px-6 py-4 whitespace-nowrap text-sm text-slate-300 text-right">${(item.ranges[range] || 0).toLocaleString('pt-BR')}</td>`).join('')}
                                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-200 text-right">${item.total.toLocaleString('pt-BR')}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                            <tfoot class="bg-slate-700">
                                <tr>
                                    <th scope="row" class="px-6 py-3 text-left text-sm font-bold text-slate-200 uppercase">Total Geral</th>
                                    ${delayRanges.map(range => `<td class="px-6 py-3 text-right text-sm font-bold text-slate-200">${totals[range].toLocaleString('pt-BR')}</td>`).join('')}
                                    <td class="px-6 py-3 text-right text-sm font-bold text-slate-100">${totals.grandTotal.toLocaleString('pt-BR')}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            `;
        };

        const renderBarChart = (id, chartData, title, isClickable = false) => {
             if (!chartData || chartData.length === 0) {
                 return `<div id="${id}" class="chart-container bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 class="text-lg font-semibold mb-4 text-slate-200">${title}</h3><p class="text-slate-400">Não há dados suficientes para exibir.</p></div>`;
             }
            return `
                <div id="${id}" class="chart-container bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <h3 class="text-lg font-semibold mb-2 text-slate-200">${title}</h3>
                    <p class="text-sm font-medium text-slate-300 mb-4 flex items-center">
                        <span class="border-t-2 border-dashed border-red-500 w-4 inline-block mr-2"></span>
                        Meta: ${OTIF_TARGET}%
                    </p>
                    <div class="space-y-4">
                        ${chartData.map(item => `
                            <div data-label="${item.label}" class="flex items-center group ${isClickable ? 'cursor-pointer clickable-bar' : ''}">
                                <p class="w-2/5 text-sm text-slate-300 truncate pr-2 group-hover:text-blue-400">${item.label} <span class="text-xs text-slate-500">(${item.totalCount})</span></p>
                                <div class="w-3/5 bg-slate-700 rounded-full h-6 relative">
                                     <div class="absolute top-0 bottom-0 border-l-2 border-dashed border-red-500 z-10" style="left: ${OTIF_TARGET}%;"></div>
                                    <div class="${getOtifColorClass(item.value)} h-6 rounded-full ${getOtifTextColorClass(item.value)} text-xs flex items-center justify-end pr-2 group-hover:opacity-80 transition-opacity" style="width: ${item.value}%;">
                                        ${item.value.toFixed(1)}%
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        };
        
        const renderCountBarChart = (id, chartData, title, isClickable = false) => {
            if (!chartData || chartData.length === 0 || chartData.every(item => item.value === 0)) {
                return `<div id="${id}" class="chart-container bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 class="text-lg font-semibold mb-4 text-slate-200">${title}</h3><p class="text-slate-400">Não há dados de atraso para exibir.</p></div>`;
            }
            const totalValue = chartData.reduce((sum, item) => sum + item.value, 0);
            const maxValue = Math.max(...chartData.map(item => item.value));
            const titleHtml = title ? `<h3 class="text-lg font-semibold mb-4 text-slate-200">${title}</h3>` : '';
            return `
                <div id="${id}" class="chart-container bg-slate-800 p-6 rounded-lg border border-slate-700">
                    ${titleHtml}
                    <div class="space-y-4">
                        ${chartData.map(item => {
                            const percentage = totalValue > 0 ? (item.value / totalValue) * 100 : 0;
                            return `
                            <div data-label="${item.label}" class="flex items-center group ${isClickable ? 'cursor-pointer clickable-bar' : ''}">
                                <p class="w-1/3 text-sm text-slate-300 truncate pr-2 group-hover:text-blue-400">${item.label}</p>
                                <div class="w-2/3 flex items-center">
                                    <div class="w-full bg-slate-700 rounded-full h-6">
                                        <div class="bg-red-500 h-6 rounded-full text-white text-xs flex items-center justify-end pr-2 group-hover:opacity-80 transition-opacity" style="width: ${(maxValue > 0 ? (item.value / maxValue) * 100 : 0)}%;">
                                            ${item.value.toLocaleString('pt-BR')}
                                        </div>
                                    </div>
                                    <p class="w-16 text-right text-sm font-semibold text-slate-200 pl-3">${percentage.toFixed(1)}%</p>
                                </div>
                            </div>
                            `
                        }).join('')}
                    </div>
                </div>`;
        };

        const renderReasonTable = (id, tableData, title, total, type) => {
            if (!tableData || tableData.length === 0) {
                 return `<div id="${id}" class="bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 class="text-lg font-semibold mb-4 text-slate-200">${title}</h3><p class="text-slate-400">Nenhum motivo registado.</p></div>`;
            }
            return `
                <div id="${id}" class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <h3 class="text-lg font-semibold mb-4 text-slate-200">${title}</h3>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-700">
                            <thead class="bg-slate-900/50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Motivo</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Ocorrências</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">% do Total</th>
                                </tr>
                            </thead>
                            <tbody class="bg-slate-800 divide-y divide-slate-700">
                                ${tableData.map(item => `
                                    <tr data-reason="${item.reason}" data-type="${type}" class="reason-row cursor-pointer hover:bg-slate-700">
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-200">${item.reason}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400">${item.count.toLocaleString('pt-BR')}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400">${total > 0 ? ((item.count / total) * 100).toFixed(1) : '0.0'}%</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        };

        const renderMapChart = (metrics) => {
            if (!metrics.mapLabelData || metrics.mapLabelData.every(r => r.count === 0)) {
                return `<div class="bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 class="text-lg font-semibold mb-4 text-slate-200">Distribuição por Região</h3><p class="text-slate-400">Não há dados de notas fiscais por região para exibir.</p></div>`;
            }
        
            return `
                <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <h3 class="text-lg font-semibold mb-4 text-slate-200">Distribuição de Notas Fiscais por Região</h3>
                    <div class="relative w-full mx-auto" style="max-width: 600px;">
                        <div id="geochart-brazil" class="w-full" style="aspect-ratio: 1/1;"></div>
                        ${metrics.mapLabelData.map(region => {
                            if (region.count === 0) return '';
                            return `
                            <div class="absolute p-2 bg-black bg-opacity-60 text-white rounded-md text-xs pointer-events-none transform -translate-x-1/2 -translate-y-1/2 text-center" 
                                 style="top: ${region.position.top}; left: ${region.position.left};">
                                <p class="font-bold">${region.name}</p>
                                <p>${region.count.toLocaleString('pt-BR')} NFs</p>
                                <p>(${region.percentage})</p>
                            </div>
                            `
                        }).join('')}
                    </div>
                </div>
            `;
        };
        
        const renderRegionDetailView = (region) => {
            const regionData = getFilteredData().filter(row => getRowValue(row, 'region') === region);
            const metrics = calculateMetrics(regionData);

            if (metrics.totalDeliveries === 0) {
                 return `<div class="bg-slate-800 p-6 rounded-lg border border-slate-700 text-center"><h3 class="text-lg font-semibold text-slate-200">Nenhum dado para a região ${region} no período selecionado.</h3></div>`;
            }

            return `
            ${renderDashboardHeader(metrics)}
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                ${renderStatCard('OTIF na Região', `${metrics.otifRate.toFixed(1)}%`, 'bg-blue-500/20 text-blue-400', '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>')}

                ${renderStatCard('In-Full', `${metrics.inFullRate.toFixed(1)}%`, 'bg-indigo-500/20 text-indigo-400', '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" /></svg>')}

                 return `<div class="bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 class="text-lg font-semibold mb-4 text-slate-200">${title} (${yearLabel})</h3><p class="text-slate-400">Nenhum dado para exibir.</p></div>`;

            let html = `<div class="bg-slate-800 p-6 rounded-lg border border-slate-700">

                 <p class="text-base font-medium text-slate-300 mb-4 flex items-center">

                        <span class="absolute right-2" style="bottom: 75%; transform: translateY(50%);">75%</span>
                        <span class="absolute right-2" style="bottom: 50%; transform: translateY(50%);">50%</span>

                        <div class="absolute top-0 w-full z-10" style="bottom: ${target}%;">

            visibleData.forEach(monthData => {
                const value = monthData[metricKey];
                html += `<div class="relative flex justify-center items-end h-full px-1 group">`;
                if (value !== undefined) {
                            html += `<div class="absolute text-center w-full text-[11px] font-semibold text-slate-100" style="bottom: calc(${value}% + 8px);">${value.toFixed(1)}%</div>
                                <div class="${colorClassFn(value)}" style="height: ${value}%; width: 90%;"></div>`;
                }
                html += `</div>`;
